<!DOCTYPE html>
<html>

<head>
<title>Mapa de Problemas de Agua</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

// Initialize map
var map = L.map('map').setView([21.8853,-102.2916],12);

// Map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
attribution:'© OpenStreetMap'
}).addTo(map);

// Google Sheets CSV
var sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRUlt5lfU4B_aTfev0aUKRZokE7E5ROG8eoU3BEdXuhoMXorO3x1XO-Ht9QypGVCufHCcTtfOQAfWFz/pub?output=csv";

// Parse CSV
Papa.parse(sheetURL,{
download:true,
header:true,

transformHeader: function(header){
return header.trim();
},

complete:function(results){

results.data.forEach(function(row){

// Only read coordinates
var lat = parseFloat(row["Latitud"]);
var lon = parseFloat(row["Longitud"]);

// Only create marker if coordinates exist
if(!isNaN(lat) && !isNaN(lon)){

L.marker([lat,lon]).addTo(map);

}

});

}

});

// Refresh map every minute
setInterval(function(){
location.reload();
},60000);

</script>

</body>

</html>
